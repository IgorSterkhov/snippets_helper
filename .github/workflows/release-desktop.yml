name: Release Desktop (Rust)

on:
  push:
    tags:
      # Full releases rebuild the native bundle + publish frontend OTA.
      - 'v*'
      # Frontend-only releases skip the native build; the client keeps
      # using the most recent v-tag .dmg / .exe, just with a fresh JS/CSS/HTML.
      - 'f-*'

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Stamp bundled frontend-version.json
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          NATIVE="${GITHUB_REF_NAME#v}"
          VERSION="${NATIVE}-f${SHA}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > desktop-rust/src/frontend-version.json
          cat desktop-rust/src/frontend-version.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop-rust/src-tauri -> target'

      - name: Build whisper-server from source
        if: startsWith(github.ref, 'refs/tags/v') && (runner.os == 'macOS' || runner.os == 'Windows')
        shell: bash
        run: |
          VERSION=$(cat desktop-rust/WHISPER_CPP_VERSION)
          git clone --depth 1 --branch "${VERSION}" https://github.com/ggml-org/whisper.cpp /tmp/wcpp
          cd /tmp/wcpp
          # Note: in whisper.cpp v1.7.x the CMake target is `server` (not
          # `whisper-server`) — see examples/server/CMakeLists.txt which sets
          # TARGET = server. We rename the binary on copy for Tauri's
          # externalBin triple convention.
          # BUILD_SHARED_LIBS=OFF: statically link ggml + whisper into
          # server.exe. Without this on Windows the exe fails to start with
          # "не обнаружена whisper.dll" because only server.exe is copied
          # into Tauri's externalBin (the companion .dll files stay in the
          # cmake build dir). macOS same flag for consistency + to avoid
          # needing to ship .dylib companions.
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -B build -DWHISPER_BUILD_SERVER=ON -DGGML_METAL=ON -DWHISPER_SDL2=OFF -DBUILD_SHARED_LIBS=OFF
            cmake --build build -j --target server
            BIN_SRC=build/bin/server
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          else
            cmake -B build -DWHISPER_BUILD_SERVER=ON -DWHISPER_SDL2=OFF -DBUILD_SHARED_LIBS=OFF
            cmake --build build --config Release -j --target server
            BIN_SRC=build/bin/Release/server.exe
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/whisper-server-x86_64-pc-windows-msvc.exe"
          fi
          mkdir -p "$(dirname "$BIN_DST")"
          cp "$BIN_SRC" "$BIN_DST"
          chmod +x "$BIN_DST" || true

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: desktop-rust
          tagName: ${{ github.ref_name }}
          releaseName: 'Keyboard Helper ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  release-frontend:
    # Runs on both v-* and f-* tags. For v-* we depend on `release` so the
    # native assets land first; for f-* the native job is skipped and the
    # if: always() branch still lets us run.
    needs: release
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute frontend version
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            NATIVE="${GITHUB_REF_NAME#v}"
          else
            NATIVE=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | head -n1 | sed 's/^v//')
            if [ -z "$NATIVE" ]; then NATIVE="0.0.0"; fi
          fi
          VERSION="${NATIVE}-f${SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_frontend_only=$([[ "$GITHUB_REF_NAME" == f-* ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Package frontend zip
        id: pack
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > desktop-rust/src/frontend-version.json
          cd desktop-rust/src
          zip -r "../../frontend-${VERSION}.zip" . \
            -x "dev.html" "dev-mock.js" "dev-test.py" "__pycache__/*"
          cd "$GITHUB_WORKSPACE"
          SHA=$(sha256sum "frontend-${VERSION}.zip" | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Sign frontend zip
        id: sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="frontend-${VERSION}.zip"
          cargo install --quiet --locked rsign2 --version '^0.6' || cargo install --quiet rsign2
          mkdir -p /tmp/rsign
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/rsign/key.txt 2>/dev/null || \
            printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > /tmp/rsign/key.txt
          echo "" | rsign sign -W -s /tmp/rsign/key.txt -x "${ZIP}.sig" "$ZIP"
          SIG=$(base64 -w0 < "${ZIP}.sig" || base64 < "${ZIP}.sig" | tr -d '\n')
          echo "signature=$SIG" >> $GITHUB_OUTPUT
          rm -rf /tmp/rsign

      - name: Write manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/frontend-${VERSION}.zip"
          SIG="${{ steps.sign.outputs.signature }}"
          SHA="${{ steps.pack.outputs.sha256 }}"
          cat > frontend-version.json <<EOF
          {
            "version": "$VERSION",
            "url": "$URL",
            "signature": "$SIG",
            "sha256": "$SHA"
          }
          EOF
          cat frontend-version.json

      - name: Carry forward native latest.json (frontend-only releases)
        if: steps.meta.outputs.is_frontend_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Find the most recent v-tag release that actually has latest.json.
          LATEST_V=""
          for TAG in $(gh release list --limit 30 --json tagName --jq '.[].tagName'); do
            if [[ "$TAG" == v* ]]; then
              if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q '^latest\.json$'; then
                LATEST_V="$TAG"; break
              fi
            fi
          done
          if [ -z "$LATEST_V" ]; then
            echo "No previous v-tag release with latest.json — native updater endpoint will 404 until next v-release."
            exit 0
          fi
          echo "Copying latest.json from $LATEST_V"
          gh release download "$LATEST_V" -p latest.json -D /tmp/latest-json
          mv /tmp/latest-json/latest.json ./latest.json

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            frontend-${{ steps.meta.outputs.version }}.zip
            frontend-version.json
            latest.json
          fail_on_unmatched_files: false
