name: Release Desktop (Rust)

on:
  push:
    tags:
      # Full releases rebuild the native bundle + publish frontend OTA.
      - 'v*'
      # Frontend-only releases skip the native build; the client keeps
      # using the most recent v-tag .dmg / .exe, just with a fresh JS/CSS/HTML.
      - 'f-*'
    branches:
      # Main-branch pushes trigger the SEED-CACHE path only: runs the
      # sidecar build steps (or restores from cache), saves the resulting
      # cache under the main-branch scope, and skips "Build and release".
      # Actions/cache scopes caches per ref — without this, every v-tag
      # creates its own orphan cache that no other tag can see, so every
      # tag would build whisper+llama from scratch (~30 min on macOS).
      # A single main push after a version bump primes the cache once;
      # all subsequent v-tags can restore it via main-branch fallback.
      - main
    paths:
      # Only seed the cache when the pinned versions actually change.
      # Regular main pushes don't need to spin macOS runners.
      - 'desktop-rust/WHISPER_CPP_VERSION'
      - 'desktop-rust/LLAMA_CPP_VERSION'
      - '.github/workflows/release-desktop.yml'

jobs:
  release:
    # Runs on v-tag (full release) AND on main pushes (cache-seed only,
    # "Build and release" step is skipped below).
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Stamp bundled frontend-version.json
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          NATIVE="${GITHUB_REF_NAME#v}"
          VERSION="${NATIVE}-f${SHA}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > desktop-rust/src/frontend-version.json
          cat desktop-rust/src/frontend-version.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop-rust/src-tauri -> target'

      # Cache compiled sidecar binaries (whisper-server + llama-server)
      # keyed on the pinned source versions. First v-release with a new
      # version builds from scratch (~5 min whisper + ~25 min llama/Metal
      # on macOS); subsequent v-releases restore in ~5 sec.
      # Scope: v-tagged builds on Mac/Windows (Linux runner doesn't build
      # sidecars, uses stubs).
      - name: Cache sidecar binaries
        id: sidecars-cache
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && (runner.os == 'macOS' || runner.os == 'Windows')
        uses: actions/cache@v4
        with:
          path: desktop-rust/src-tauri/binaries
          key: sidecars-${{ runner.os }}-whisper-${{ hashFiles('desktop-rust/WHISPER_CPP_VERSION') }}-llama-${{ hashFiles('desktop-rust/LLAMA_CPP_VERSION') }}-v1

      - name: Build whisper-server from source
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && (runner.os == 'macOS' || runner.os == 'Windows') && steps.sidecars-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION=$(cat desktop-rust/WHISPER_CPP_VERSION)
          git clone --depth 1 --branch "${VERSION}" https://github.com/ggml-org/whisper.cpp /tmp/wcpp
          cd /tmp/wcpp
          # Note: in whisper.cpp v1.7.x the CMake target is `server` (not
          # `whisper-server`) — see examples/server/CMakeLists.txt which sets
          # TARGET = server. We rename the binary on copy for Tauri's
          # externalBin triple convention.
          # BUILD_SHARED_LIBS=OFF: statically link ggml + whisper into
          # server.exe. Without this on Windows the exe fails to start with
          # "не обнаружена whisper.dll" because only server.exe is copied
          # into Tauri's externalBin (the companion .dll files stay in the
          # cmake build dir). macOS same flag for consistency + to avoid
          # needing to ship .dylib companions.
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -B build -DWHISPER_BUILD_SERVER=ON -DGGML_METAL=ON -DWHISPER_SDL2=OFF -DBUILD_SHARED_LIBS=OFF
            cmake --build build -j --target server
            BIN_SRC=build/bin/server
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          else
            cmake -B build -DWHISPER_BUILD_SERVER=ON -DWHISPER_SDL2=OFF -DBUILD_SHARED_LIBS=OFF
            cmake --build build --config Release -j --target server
            BIN_SRC=build/bin/Release/server.exe
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/whisper-server-x86_64-pc-windows-msvc.exe"
          fi
          mkdir -p "$(dirname "$BIN_DST")"
          cp "$BIN_SRC" "$BIN_DST"
          chmod +x "$BIN_DST" || true

      - name: Build llama-server from source (for Gemma post-processing)
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && (runner.os == 'macOS' || runner.os == 'Windows') && steps.sidecars-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION=$(cat desktop-rust/LLAMA_CPP_VERSION)
          git clone --depth 1 --branch "${VERSION}" https://github.com/ggml-org/llama.cpp /tmp/lcpp
          cd /tmp/lcpp
          # Target name in llama.cpp is `llama-server` (examples/server → CMake
          # target). Same rationale as whisper.cpp for BUILD_SHARED_LIBS=OFF:
          # statically link ggml + llama into the server binary so we don't have
          # to ship separate .dll/.dylib companions via externalBin.
          # CURL OFF: avoid libcurl dep on Windows (we don't use server's model
          # download feature — we download models ourselves from the frontend).
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -B build -DLLAMA_BUILD_SERVER=ON -DLLAMA_CURL=OFF -DGGML_METAL=ON -DBUILD_SHARED_LIBS=OFF
            cmake --build build -j --target llama-server
            BIN_SRC=build/bin/llama-server
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/llama-server-aarch64-apple-darwin"
          else
            cmake -B build -DLLAMA_BUILD_SERVER=ON -DLLAMA_CURL=OFF -DBUILD_SHARED_LIBS=OFF
            cmake --build build --config Release -j --target llama-server
            BIN_SRC=build/bin/Release/llama-server.exe
            BIN_DST="$GITHUB_WORKSPACE/desktop-rust/src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe"
          fi
          mkdir -p "$(dirname "$BIN_DST")"
          cp "$BIN_SRC" "$BIN_DST"
          chmod +x "$BIN_DST" || true

      - name: Build and release
        # Skip on main-branch cache-seed pushes — only v-tags should
        # actually build the installer + publish the release.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: desktop-rust
          tagName: ${{ github.ref_name }}
          releaseName: 'Keyboard Helper ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  release-frontend:
    # Runs on both v-* and f-* tags (NOT on main-branch seed pushes).
    # For v-* we depend on `release` so the native assets land first;
    # for f-* the native job is skipped and the if: always() branch
    # still lets us run.
    needs: release
    # `always()` is required: without it, GitHub Actions transitively skips
    # this job whenever the upstream `release` job is skipped — which
    # happens on every f-* tag (release skips because its own `if:` excludes
    # f-*). The earlier wording mentioned `always()` in the comment but the
    # expression was dropped in commit 683bac4 alongside the cache-seed
    # work, breaking f-* releases. Restored.
    if: always() && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/f-')) && (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute frontend version
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            NATIVE="${GITHUB_REF_NAME#v}"
          else
            NATIVE=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | head -n1 | sed 's/^v//')
            if [ -z "$NATIVE" ]; then NATIVE="0.0.0"; fi
          fi
          VERSION="${NATIVE}-f${SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_frontend_only=$([[ "$GITHUB_REF_NAME" == f-* ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Package frontend zip
        id: pack
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > desktop-rust/src/frontend-version.json
          cd desktop-rust/src
          zip -r "../../frontend-${VERSION}.zip" . \
            -x "dev.html" "dev-mock.js" "dev-test.py" "__pycache__/*"
          cd "$GITHUB_WORKSPACE"
          SHA=$(sha256sum "frontend-${VERSION}.zip" | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Sign frontend zip
        id: sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="frontend-${VERSION}.zip"
          cargo install --quiet --locked rsign2 --version '^0.6' || cargo install --quiet rsign2
          mkdir -p /tmp/rsign
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/rsign/key.txt 2>/dev/null || \
            printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > /tmp/rsign/key.txt
          echo "" | rsign sign -W -s /tmp/rsign/key.txt -x "${ZIP}.sig" "$ZIP"
          SIG=$(base64 -w0 < "${ZIP}.sig" || base64 < "${ZIP}.sig" | tr -d '\n')
          echo "signature=$SIG" >> $GITHUB_OUTPUT
          rm -rf /tmp/rsign

      - name: Write manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/frontend-${VERSION}.zip"
          SIG="${{ steps.sign.outputs.signature }}"
          SHA="${{ steps.pack.outputs.sha256 }}"
          cat > frontend-version.json <<EOF
          {
            "version": "$VERSION",
            "url": "$URL",
            "signature": "$SIG",
            "sha256": "$SHA"
          }
          EOF
          cat frontend-version.json

      - name: Carry forward native latest.json (frontend-only releases)
        if: steps.meta.outputs.is_frontend_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Find the most recent v-tag release that actually has latest.json.
          LATEST_V=""
          for TAG in $(gh release list --limit 30 --json tagName --jq '.[].tagName'); do
            if [[ "$TAG" == v* ]]; then
              if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q '^latest\.json$'; then
                LATEST_V="$TAG"; break
              fi
            fi
          done
          if [ -z "$LATEST_V" ]; then
            echo "No previous v-tag release with latest.json — native updater endpoint will 404 until next v-release."
            exit 0
          fi
          echo "Copying latest.json from $LATEST_V"
          gh release download "$LATEST_V" -p latest.json -D /tmp/latest-json
          mv /tmp/latest-json/latest.json ./latest.json

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            frontend-${{ steps.meta.outputs.version }}.zip
            frontend-version.json
            latest.json
          fail_on_unmatched_files: false
