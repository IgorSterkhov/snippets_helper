services:
  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: snippets_migrate
    command: ["python", "-m", "alembic", "-c", "api/alembic/alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://snippets_sync:${POSTGRES_PASSWORD}@isterapp_db:5432/snippets_sync
    networks:
      - isterapp_net
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: snippets_api
    environment:
      DATABASE_URL: postgresql+asyncpg://snippets_sync:${POSTGRES_PASSWORD}@isterapp_db:5432/snippets_sync
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-30}
    expose:
      - "8001"
    volumes:
      - /opt/isterapp/uploads/snippets-media:/opt/isterapp/uploads/snippets-media
    networks:
      - isterapp_net
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  isterapp_net:
    external: true
    name: backend_default
